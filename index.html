<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEPORTO · BRATALO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b0e14;--card:#151923;--border:#1e2636;--text:#e2e8f0;--muted:#7a8599;
  --accent:#3b82f6;--accent2:#60a5fa;--glow:rgba(59,130,246,.15);--danger:#ef4444;
}
[data-theme="light"]{
  --bg:#f1f5f9;--card:#ffffff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;
  --accent:#2563eb;--accent2:#3b82f6;--glow:rgba(37,99,235,.08);--danger:#dc2626;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;position:relative}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;opacity:.3;pointer-events:none}
.bg-glow{position:fixed;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,var(--glow),transparent 70%);top:30%;left:50%;transform:translate(-50%,-50%);pointer-events:none;animation:pulse 4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:0 25px 60px rgba(0,0,0,.25)}
.logo-area{text-align:center;margin-bottom:36px}
.logo-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:14px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 8px 24px var(--glow)}
.logo-icon svg{width:28px;height:28px;fill:#fff}
.logo-title{font-family:'Outfit',sans-serif;font-weight:800;font-size:26px;letter-spacing:-.5px}
.logo-sub{color:var(--muted);font-size:13px;margin-top:4px;font-weight:500}
.field{margin-bottom:20px}
.field label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px}
.field input{width:100%;padding:14px 16px;background:var(--bg);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;font-family:inherit;transition:border .2s,box-shadow .2s;outline:none}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
.error-msg{color:var(--danger);font-size:13px;margin-top:8px;display:none;font-weight:500}
.error-msg.show{display:block;animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.btn-login{width:100%;padding:15px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:transform .15s,box-shadow .15s}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 8px 24px var(--glow)}
.btn-login:active{transform:translateY(0)}
.theme-toggle{position:fixed;top:20px;right:20px;z-index:10;background:var(--card);border:1px solid var(--border);border-radius:10px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.theme-toggle svg{width:20px;height:20px;fill:var(--muted)}
@media(max-width:480px){.login-card{padding:36px 24px;border-radius:16px}}
</style>
</head>
<body data-theme="dark">
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24"><path d="M12 3a1 1 0 011 1v1a1 1 0 01-2 0V4a1 1 0 011-1zm0 15a1 1 0 011 1v1a1 1 0 01-2 0v-1a1 1 0 011-1zm9-6a1 1 0 010 2h-1a1 1 0 010-2h1zM5 12a1 1 0 010 2H4a1 1 0 010-2h1zm14.07-6.36a1 1 0 010 1.41l-.71.71a1 1 0 01-1.41-1.41l.71-.71a1 1 0 011.41 0zM7.05 17.66a1 1 0 010 1.41l-.71.71a1 1 0 01-1.41-1.41l.71-.71a1 1 0 011.41 0zM19.07 18.36a1 1 0 01-1.41 0l-.71-.71a1 1 0 011.41-1.41l.71.71a1 1 0 010 1.41zM7.05 6.34a1 1 0 01-1.41 0l-.71-.71A1 1 0 016.34 4.22l.71.71a1 1 0 010 1.41zM12 8a4 4 0 100 8 4 4 0 000-8z"/></svg></button>
<div class="login-wrap">
  <div class="login-card">
    <div class="logo-area">
      <div class="logo-title">BRATALO</div>
      <div class="logo-sub">Panel de Control · Inventario</div>
    </div>
    <form onsubmit="return doLogin(event)">
      <div class="field"><label>Usuario</label><input type="text" id="user" autocomplete="username" placeholder="Ingresa tu usuario" autofocus></div>
      <div class="field"><label>Contraseña</label><input type="password" id="pass" autocomplete="current-password" placeholder="••••••••"></div>
      <div class="error-msg" id="errMsg">Usuario o contraseña incorrectos</div>
      <button type="submit" class="btn-login">Iniciar Sesión</button>
    </form>
  </div>
</div>
<script>
function toggleTheme(){document.body.dataset.theme=document.body.dataset.theme==='dark'?'light':'dark';localStorage.setItem('vp_theme',document.body.dataset.theme)}
(function(){const t=localStorage.getItem('vp_theme');if(t)document.body.dataset.theme=t})();
function doLogin(e){
  e.preventDefault();
  if(document.getElementById('user').value.trim().toLowerCase()==='juan'&&document.getElementById('pass').value.trim()==='juan2026'){
    sessionStorage.setItem('vp_auth','1');sessionStorage.setItem('vp_user','Juan');window.location.href='inventario.html';
  }else{const em=document.getElementById('errMsg');em.classList.remove('show');void em.offsetWidth;em.classList.add('show')}
  return false;
}
</script>
</body>
</html>
