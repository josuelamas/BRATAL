<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Bratalo · Login</title>
<style>
:root{
 --bg:#f4f6fa; --panel:#ffffff; --panel2:#f9fafc; --border:#e4e7ee;
 --text:#1f2937; --muted:#6b7280; --accent:#0ea5e9; --accent-2:#0284c7;
 --bad:#ef4444; --ink:#111827;
}
html[data-theme="dark"]{
 --bg:#0b1220; --panel:#111a2c; --panel2:#0f1728; --border:#1e2a44;
 --text:#e5e7eb; --muted:#94a3b8; --accent:#38bdf8; --accent-2:#0ea5e9;
 --bad:#f87171; --ink:#f8fafc;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased;min-height:100vh}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit;color:var(--text)}

.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative}
.theme-btn{position:absolute;top:16px;right:16px;width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text)}
.theme-btn:hover{background:var(--border)}

.login-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:32px 28px;box-shadow:0 10px 40px rgba(0,0,0,.12);width:100%;max-width:380px;text-align:center}
.login-logo{width:72px;height:72px;border-radius:16px;margin-bottom:14px}
.login-title{font-size:24px;font-weight:800;color:var(--accent);margin:0 0 2px;letter-spacing:1px}
.login-sub{font-size:12.5px;color:var(--muted);margin-bottom:22px}

.form-row{text-align:left;margin-bottom:12px}
.form-row label{font-size:11px;font-weight:600;text-transform:uppercase;color:var(--muted);letter-spacing:.4px;display:block;margin-bottom:4px}
.form-row input{padding:10px 12px;border:1px solid var(--border);background:var(--panel2);border-radius:8px;font-size:14px;color:var(--text);width:100%}
.form-row input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(14,165,233,.15)}

.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:8px;width:100%;padding:11px;font-size:14px;font-weight:500;margin-top:6px;transition:background .15s}
.btn-primary:hover{background:var(--accent-2)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}

.login-error{background:rgba(239,68,68,.12);color:var(--bad);border:1px solid rgba(239,68,68,.3);border-radius:7px;padding:8px 10px;font-size:12.5px;margin-bottom:10px;text-align:center}
.login-error.hidden{display:none}

.loading-indicator{display:none;margin-top:14px;color:var(--muted);font-size:12.5px}
.loading-indicator.visible{display:block}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

    <h1 class="login-title">BRATALO</h1>
    <div class="login-sub">Dashboard de Inventario</div>
    <form id="loginForm" onsubmit="return doLogin(event)">
      <div class="form-row">
        <label>Usuario</label>
        <input id="loginUser" type="text" autocomplete="username" required autofocus>
      </div>
      <div class="form-row">
        <label>Contraseña</label>
        <input id="loginPass" type="password" autocomplete="current-password" required>
      </div>
      <div id="loginError" class="login-error hidden"></div>
      <button type="submit" class="btn-primary" id="loginBtn">Ingresar</button>
      <div id="loadingMsg" class="loading-indicator">
        <span class="spinner"></span><span id="loadingText">Cargando dashboard...</span>
      </div>
    </form>

<script>
// SHA-256 hash de "JUAN2026"
const AUTH_USERS = {
  'JUAN': 'f6a4defca84bcfd7f5ddb04faae772918588273a7e71da3eaa29acb54e8fda2f'
};
const SESSION_KEY = 'clmx-auth';

async function sha256(text){
  const buf = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn').textContent = t==='dark' ? '☀️' : '🌙';
  try{ localStorage.setItem('clmx-theme', t); }catch(e){}
}
(function initTheme(){
  let t='light';
  try{
    t = localStorage.getItem('clmx-theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
  }catch(e){}
  applyTheme(t);
})();
document.getElementById('themeBtn').addEventListener('click', ()=>{
  const cur = document.documentElement.getAttribute('data-theme');
  applyTheme(cur==='dark'?'light':'dark');
});

async function doLogin(ev){
  ev.preventDefault();
  const user = document.getElementById('loginUser').value.trim().toUpperCase();
  const pass = document.getElementById('loginPass').value;
  const errBox = document.getElementById('loginError');

  const expected = AUTH_USERS[user];
  if(!expected){
    errBox.textContent = '❌ Usuario o contraseña incorrectos';
    errBox.classList.remove('hidden');
    return false;
  }
  const hash = await sha256(pass);
  if(hash !== expected){
    errBox.textContent = '❌ Usuario o contraseña incorrectos';
    errBox.classList.remove('hidden');
    document.getElementById('loginPass').value = '';
    return false;
  }

  // OK — guardar sesión y redirigir
  const session = { user, token: hash.slice(0,16), ts: Date.now() };
  localStorage.setItem(SESSION_KEY, JSON.stringify(session));
  errBox.classList.add('hidden');

  document.getElementById('loginBtn').disabled = true;
  document.getElementById('loadingMsg').classList.add('visible');
  setTimeout(()=>{ window.location.href = 'dashboard.html'; }, 120);
  return false;
}

// Si ya hay sesión, ir directo al dashboard
(function checkSession(){
  try{
    const s = localStorage.getItem(SESSION_KEY);
    if(s){
      const data = JSON.parse(s);
      if(data && data.user && data.token){
        document.getElementById('loadingMsg').classList.add('visible');
        document.getElementById('loadingText').textContent = 'Abriendo dashboard...';
        window.location.href = 'dashboard.html';
      }
    }
  }catch(e){}
})();
</script>
