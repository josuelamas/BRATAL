<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario · BRATALO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b0e14;--card:#151923;--card2:#1a2030;--border:#1e2636;--text:#e2e8f0;--muted:#7a8599;
  --accent:#3b82f6;--accent2:#60a5fa;--glow:rgba(59,130,246,.15);
  --danger:#ef4444;--success:#22c55e;--warning:#f59e0b;--info:#06b6d4;
  --sidebar-w:260px;
}
[data-theme="light"]{
  --bg:#f1f5f9;--card:#ffffff;--card2:#f8fafc;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;
  --accent:#2563eb;--accent2:#3b82f6;--glow:rgba(37,99,235,.08);
  --danger:#dc2626;--success:#16a34a;--warning:#d97706;--info:#0891b2;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:transform .3s}
.sidebar-logo{padding:24px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.sidebar-logo span{font-family:'Outfit',sans-serif;font-weight:700;font-size:16px}
.sidebar-nav{flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:4px}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;color:var(--muted);transition:all .15s;border:none;background:none;width:100%;text-align:left;text-decoration:none}
.nav-item:hover{background:var(--glow);color:var(--text)}
.nav-item.active{background:var(--glow);color:var(--accent);font-weight:600}
.nav-item svg{width:20px;height:20px;fill:currentColor;flex-shrink:0}
.sidebar-footer{padding:16px 12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.user-info{display:flex;align-items:center;gap:10px;padding:8px 10px}
.user-avatar{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--success));display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700}
.user-name{font-size:13px;font-weight:600}
.user-role{font-size:11px;color:var(--muted)}
.btn-logout{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--danger);background:none;border:none;font-family:inherit;font-weight:500;width:100%;text-align:left}
.btn-logout:hover{background:rgba(239,68,68,.08)}
.btn-logout svg{width:16px;height:16px;fill:currentColor}
.main{margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);background:var(--card);position:sticky;top:0;z-index:50}
.topbar-title{font-family:'Outfit',sans-serif;font-weight:700;font-size:20px}
.btn-theme{background:var(--bg);border:1px solid var(--border);border-radius:8px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.btn-theme svg{width:18px;height:18px;fill:var(--muted)}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:8px}
.hamburger svg{width:24px;height:24px;fill:var(--text)}
.content{flex:1;padding:24px 28px}
/* KPIs */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:22px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi:nth-child(1)::before{background:var(--accent)}
.kpi:nth-child(2)::before{background:var(--success)}
.kpi:nth-child(3)::before{background:var(--warning)}
.kpi:nth-child(4)::before{background:var(--danger)}
.kpi:nth-child(5)::before{background:var(--info)}
.kpi-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.kpi-val{font-family:'Outfit',sans-serif;font-size:26px;font-weight:800;margin-top:4px}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:3px}
/* Filters */
.filters-bar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:4px;min-width:150px;flex:1;max-width:240px}
.filter-group label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.filter-group select{padding:9px 11px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-family:inherit;outline:none;cursor:pointer;width:100%}
.filter-group select:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--glow)}
.btn-filter{padding:9px 16px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-weight:600;font-size:13px;font-family:inherit;cursor:pointer;height:38px;white-space:nowrap}
.btn-filter:hover{opacity:.9}
.btn-clear{padding:9px 16px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-weight:600;font-size:13px;font-family:inherit;cursor:pointer;height:38px;white-space:nowrap}
/* Chart */
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:22px}
.chart-wrap h3{font-size:15px;font-weight:700;margin-bottom:14px}
.chart-container{position:relative;height:280px;width:100%}
/* Table */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.table-header h3{font-size:15px;font-weight:700}
.table-count{font-size:12px;color:var(--muted);font-weight:500}
.table-scroll{overflow-x:auto;max-height:55vh;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{position:sticky;top:0;z-index:2}
th{background:var(--card2);padding:9px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
tr:hover td{background:var(--glow)}
.badge{padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700;display:inline-block}
.badge-a{background:rgba(34,197,94,.12);color:var(--success)}
.badge-r{background:rgba(239,68,68,.12);color:var(--danger)}
.badge-d{background:rgba(245,158,11,.12);color:var(--warning)}
.badge-q{background:rgba(168,85,247,.12);color:#a855f7}
.badge-desp-a{background:rgba(34,197,94,.12);color:var(--success)}
.badge-desp-b{background:rgba(59,130,246,.12);color:var(--accent)}
.badge-desp-c{background:rgba(245,158,11,.12);color:var(--warning)}
.badge-desp-d{background:rgba(239,68,68,.12);color:var(--danger)}
.badge-desp-n{background:rgba(100,116,139,.12);color:var(--muted)}
.faltante{color:var(--danger);font-weight:700}
.pagination{display:flex;align-items:center;justify-content:center;gap:6px;padding:14px}
.page-btn{padding:7px 12px;border-radius:8px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:12px;font-family:inherit;cursor:pointer}
.page-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.page-btn:disabled{opacity:.4;cursor:default}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90}
.sidebar-overlay.show{display:block}
.loading{display:flex;align-items:center;justify-content:center;height:50vh;flex-direction:column;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.show{display:block}
  .main{margin-left:0}
  .hamburger{display:flex}
  .content{padding:14px}
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .kpi{padding:12px}
  .kpi-val{font-size:20px}
  .filters-bar{flex-direction:column;gap:8px}
  .filter-group{max-width:100%;min-width:100%}
  .topbar{padding:12px 16px}
  .topbar-title{font-size:16px}
  .chart-container{height:220px}
}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}
</style>
</head>

function decompress(b64){
  const bin=atob(b64),bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  const ds=new DecompressionStream('gzip'),w=ds.writable.getWriter(),r=ds.readable.getReader();
  w.write(bytes);w.close();
  const chunks=[];
  return (async()=>{while(true){const{done,value}=await r.read();if(done)break;chunks.push(value)}return new TextDecoder().decode(await new Blob(chunks).arrayBuffer())})();
}

const PG=100;

function populateFilters(){
  const sems=new Set(), provs=new Set(), sucs=new Map(), arts=new Map();
  RAW.forEach(r=>{
    sems.add(r.sem);
    provs.add(r.prov);
    sucs.set(r.idSuc,r.suc);
    arts.set(r.idArt,r.art);
  });
  const fSem=document.getElementById('fSem');
  [...sems].sort().forEach(s=>fSem.innerHTML+=`<option value="${s}">Sem ${s}</option>`);
  
  const fProv=document.getElementById('fProv');
  [...provs].sort().forEach(p=>fProv.innerHTML+=`<option value="${p}">${p}</option>`);

  const fSuc=document.getElementById('fSuc');
  [...sucs.entries()].sort((a,b)=>a[1].localeCompare(b[1])).forEach(([id,n])=>fSuc.innerHTML+=`<option value="${id}">${id} – ${n}</option>`);

  const fArt=document.getElementById('fArt');
  [...arts.entries()].sort((a,b)=>a[1].localeCompare(b[1])).forEach(([id,n])=>fArt.innerHTML+=`<option value="${id}">${n}</option>`);
}

function applyFilters(){
  const sem=document.getElementById('fSem').value,
        prov=document.getElementById('fProv').value,
        suc=document.getElementById('fSuc').value,
        art=document.getElementById('fArt').value,
        est=document.getElementById('fEstSuc').value,
        desp=document.getElementById('fDesp').value,
        falt=document.getElementById('fFalt').value;
  
  FILTERED=RAW.filter(r=>{
    if(sem&&r.sem!=sem)return false;
    if(prov&&r.prov!==prov)return false;
    if(suc&&r.idSuc!=suc)return false;
    if(art&&r.idArt!=art)return false;
    if(est==='A'&&r.estSuc!=='A')return false;
    if(est==='retired'&&r.estSuc==='A')return false;
    if(desp&&r.desp!==desp)return false;
    if(falt==='1'&&r.falt<=0)return false;
    return true;
  });
  pg=1;
  renderKPIs();
  renderChart();
  renderTable();
}

function clearFilters(){
  ['fSem','fProv','fSuc','fArt','fEstSuc','fDesp','fFalt'].forEach(id=>document.getElementById(id).value='');
  applyFilters();
}

function renderKPIs(){
  const cat=FILTERED.filter(r=>r.estSuc==='A');
  const exTda=FILTERED.reduce((s,r)=>s+Math.max(0,r.exTda),0);
  const cajTda=FILTERED.reduce((s,r)=>s+(r.uds>0?Math.max(0,r.exTda)/r.uds:0),0);
  const falt=FILTERED.reduce((s,r)=>s+Math.max(0,r.falt),0);
  const skuF=FILTERED.filter(r=>r.falt>0).length;
  const pct=cat.length>0?((cat.filter(r=>r.exTda>0).length/cat.length)*100).toFixed(1):'0';
  const semsCount=new Set(FILTERED.map(r=>r.sem)).size;
  document.getElementById('kpiGrid').innerHTML=`
    <div class="kpi"><div class="kpi-label">Semanas</div><div class="kpi-val">${semsCount}</div><div class="kpi-sub">${FILTERED.length.toLocaleString()} registros</div></div>
    <div class="kpi"><div class="kpi-label">SKUs Catalogados</div><div class="kpi-val">${cat.length.toLocaleString()}</div><div class="kpi-sub">Estado Suc = A</div></div>
    <div class="kpi"><div class="kpi-label">Exist. Tiendas</div><div class="kpi-val">${exTda.toLocaleString(undefined,{maximumFractionDigits:0})}</div><div class="kpi-sub">${cajTda.toLocaleString(undefined,{maximumFractionDigits:0})} cajas</div></div>
    <div class="kpi"><div class="kpi-label">Uds Faltantes</div><div class="kpi-val">${falt.toLocaleString(undefined,{maximumFractionDigits:0})}</div><div class="kpi-sub">${skuF} registros</div></div>
    <div class="kpi"><div class="kpi-label">% Abasto</div><div class="kpi-val">${pct}%</div><div class="kpi-sub">Catalogados con stock</div></div>`;
}

function getChartColors(){
  const dark=document.body.dataset.theme==='dark';
  return {
    text:dark?'#e2e8f0':'#1e293b',
    grid:dark?'rgba(255,255,255,.06)':'rgba(0,0,0,.06)',
    accent:'#3b82f6',
    success:'#22c55e',
    danger:'#ef4444',
    warning:'#f59e0b',
    info:'#06b6d4'
  };
}

function renderChart(){
  // Aggregate data by week using current filter criteria EXCEPT week
  const sem=document.getElementById('fSem').value,
        prov=document.getElementById('fProv').value,
        suc=document.getElementById('fSuc').value,
        art=document.getElementById('fArt').value,
        est=document.getElementById('fEstSuc').value,
        desp=document.getElementById('fDesp').value,
        falt=document.getElementById('fFalt').value;

  const chartData=RAW.filter(r=>{
    // Apply all filters EXCEPT week so we see all weeks in the chart
    if(prov&&r.prov!==prov)return false;
    if(suc&&r.idSuc!=suc)return false;
    if(art&&r.idArt!=art)return false;
    if(est==='A'&&r.estSuc!=='A')return false;
    if(est==='retired'&&r.estSuc==='A')return false;
    if(desp&&r.desp!==desp)return false;
    if(falt==='1'&&r.falt<=0)return false;
    return true;
  });

  const weeks=new Map();
  chartData.forEach(r=>{
    if(!weeks.has(r.sem))weeks.set(r.sem,{exTda:0,exCD:0,falt:0,cat:0,catStock:0,cajasTda:0,cajasCD:0});
    const w=weeks.get(r.sem);
    w.exTda+=Math.max(0,r.exTda);
    w.exCD+=Math.max(0,r.exCD);
    w.falt+=Math.max(0,r.falt);
    if(r.uds>0){w.cajasTda+=Math.max(0,r.exTda)/r.uds;w.cajasCD+=Math.max(0,r.exCD)/r.uds;}
    if(r.estSuc==='A'){w.cat++;if(r.exTda>0)w.catStock++}
  });

  const sorted=[...weeks.entries()].sort((a,b)=>a[0]-b[0]);
  const labels=sorted.map(([s])=>'Sem '+String(s).slice(-2));
  const cajasTdaData=sorted.map(([,v])=>Math.round(v.cajasTda));
  const cajasCDData=sorted.map(([,v])=>Math.round(v.cajasCD));
  const faltData=sorted.map(([,v])=>Math.round(v.falt));
  const abastoData=sorted.map(([,v])=>v.cat>0?Math.round((v.catStock/v.cat)*1000)/10:0);

  const c=getChartColors();
  const ctx=document.getElementById('weeklyCanvas').getContext('2d');

  if(weeklyChart){weeklyChart.destroy();}

  weeklyChart=new Chart(ctx,{
    type:'bar',
    data:{
      labels,
      datasets:[
        {
          label:'Cajas Tienda',
          data:cajasTdaData,
          backgroundColor:c.accent+'99',
          borderColor:c.accent,
          borderWidth:1,
          borderRadius:6,
          yAxisID:'y',
          order:1
        }
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{
          labels:{color:c.text,font:{family:'DM Sans',size:12},usePointStyle:true,pointStyle:'circle',padding:16}
        },
        tooltip:{
          backgroundColor:document.body.dataset.theme==='dark'?'#1a2030':'#fff',
          titleColor:c.text,
          bodyColor:c.text,
          borderColor:document.body.dataset.theme==='dark'?'#1e2636':'#e2e8f0',
          borderWidth:1,
          padding:12,
          titleFont:{family:'DM Sans',weight:'700'},
          bodyFont:{family:'DM Sans'},
          callbacks:{
            label:function(ctx){
              return ctx.dataset.label+': '+ctx.parsed.y.toLocaleString()+' cajas';
            }
          }
        }
      },
      scales:{
        x:{
          ticks:{color:c.text,font:{family:'DM Sans',size:11}},
          grid:{display:false}
        },
        y:{
          position:'left',
          ticks:{color:c.text,font:{family:'DM Sans',size:11},callback:v=>v>=1000?(v/1000).toFixed(0)+'k':v},
          grid:{color:c.grid}
        }
      }
    }
  });
}

function updateChartColors(){
  if(!weeklyChart)return;
  const c=getChartColors();
  weeklyChart.options.scales.x.ticks.color=c.text;
  weeklyChart.options.scales.y.ticks.color=c.text;
  weeklyChart.options.scales.y.grid.color=c.grid;
  weeklyChart.options.scales.y1.ticks.color=c.success;
  weeklyChart.options.plugins.legend.labels.color=c.text;
  weeklyChart.options.plugins.tooltip.backgroundColor=document.body.dataset.theme==='dark'?'#1a2030':'#fff';
  weeklyChart.options.plugins.tooltip.titleColor=c.text;
  weeklyChart.options.plugins.tooltip.bodyColor=c.text;
  weeklyChart.options.plugins.tooltip.borderColor=document.body.dataset.theme==='dark'?'#1e2636':'#e2e8f0';
  weeklyChart.update();
}

function renderTable(){
  const s=(pg-1)*PG,e=s+PG,page=FILTERED.slice(s,e);
  document.getElementById('tableCount').textContent=FILTERED.length.toLocaleString()+' registros';
  document.getElementById('tBody').innerHTML=page.map(r=>{
    const ec=r.estSuc==='A'?'badge-a':r.estSuc==='D'?'badge-d':r.estSuc==='R'?'badge-r':'badge-q';
    const el=r.estSuc==='A'?'Catalogado':'Retirado';
    const dc='badge-desp-'+r.desp.toLowerCase();
    const ct=r.uds>0?(r.exTda/r.uds).toFixed(1):'—';
    const cc=r.uds>0?(r.exCD/r.uds).toFixed(1):'—';
    const provShort=r.prov.length>25?r.prov.substring(0,25)+'…':r.prov;
    return `<tr>
      <td>${r.sem}</td>
      <td title="${r.prov}" style="max-width:180px;overflow:hidden;text-overflow:ellipsis">${provShort}</td>
      <td>${r.idSuc}</td><td>${r.suc}</td><td>${r.idArt}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis" title="${r.art}">${r.art}</td>
      <td>${r.sap}</td>
      <td><span class="badge ${ec}">${el}</span></td>
      <td><span class="badge ${dc}">${r.desp}</span></td>
      <td style="text-align:right">${r.exTda.toLocaleString(undefined,{maximumFractionDigits:1})}</td>
      <td style="text-align:right;font-weight:600">${ct}</td>
      <td style="text-align:right">${r.exCD.toLocaleString(undefined,{maximumFractionDigits:1})}</td>
      <td style="text-align:right;font-weight:600">${cc}</td>
      <td style="text-align:center;color:var(--muted)">${r.uds}</td>
      <td style="text-align:right" class="${r.falt>0?'faltante':''}">${r.falt>0?r.falt.toLocaleString(undefined,{maximumFractionDigits:1}):'—'}</td>
    </tr>`;
  }).join('');
  renderPagination();
}

function renderPagination(){
  const tp=Math.ceil(FILTERED.length/PG);
  if(tp<=1){document.getElementById('pagination').innerHTML='';return;}
  let h='<button class="page-btn" onclick="goPage('+(pg-1)+')" '+(pg===1?'disabled':'')+'>← Ant</button>';
  const s=Math.max(1,pg-2),e=Math.min(tp,pg+2);
  if(s>1)h+='<button class="page-btn" onclick="goPage(1)">1</button>';
  if(s>2)h+='<span style="color:var(--muted)">…</span>';
  for(let i=s;i<=e;i++)h+=`<button class="page-btn ${i===pg?'active':''}" onclick="goPage(${i})">${i}</button>`;
  if(e<tp-1)h+='<span style="color:var(--muted)">…</span>';
  if(e<tp)h+=`<button class="page-btn" onclick="goPage(${tp})">${tp}</button>`;
  h+='<button class="page-btn" onclick="goPage('+(pg+1)+')" '+(pg===tp?'disabled':'')+'>Sig →</button>';
  document.getElementById('pagination').innerHTML=h;
}

function goPage(p){const tp=Math.ceil(FILTERED.length/PG);if(p<1||p>tp)return;pg=p;renderTable();document.querySelector('.table-scroll').scrollTop=0;}
</script>
</body>
</html>
