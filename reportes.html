<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reportes · BRATALO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b0e14;--card:#151923;--card2:#1a2030;--border:#1e2636;--text:#e2e8f0;--muted:#7a8599;
  --accent:#3b82f6;--accent2:#60a5fa;--glow:rgba(59,130,246,.15);
  --danger:#ef4444;--success:#22c55e;--warning:#f59e0b;--info:#06b6d4;
  --sidebar-w:260px;
}
[data-theme="light"]{
  --bg:#f1f5f9;--card:#ffffff;--card2:#f8fafc;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;
  --accent:#2563eb;--accent2:#3b82f6;--glow:rgba(37,99,235,.08);
  --danger:#dc2626;--success:#16a34a;--warning:#d97706;--info:#0891b2;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:transform .3s}
.sidebar-logo{padding:24px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.sidebar-logo span{font-family:'Outfit',sans-serif;font-weight:700;font-size:16px}
.sidebar-nav{flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:4px}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;color:var(--muted);transition:all .15s;border:none;background:none;width:100%;text-align:left;text-decoration:none}
.nav-item:hover{background:var(--glow);color:var(--text)}
.nav-item.active{background:var(--glow);color:var(--accent);font-weight:600}
.nav-item svg{width:20px;height:20px;fill:currentColor;flex-shrink:0}
.sidebar-footer{padding:16px 12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.user-info{display:flex;align-items:center;gap:10px;padding:8px 10px}
.user-avatar{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--success));display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700}
.user-name{font-size:13px;font-weight:600}
.user-role{font-size:11px;color:var(--muted)}
.btn-logout{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--danger);background:none;border:none;font-family:inherit;font-weight:500;width:100%;text-align:left}
.btn-logout:hover{background:rgba(239,68,68,.08)}
.btn-logout svg{width:16px;height:16px;fill:currentColor}
.main{margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);background:var(--card);position:sticky;top:0;z-index:50}
.topbar-title{font-family:'Outfit',sans-serif;font-weight:700;font-size:20px}
.btn-theme{background:var(--bg);border:1px solid var(--border);border-radius:8px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.btn-theme svg{width:18px;height:18px;fill:var(--muted)}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:8px}
.hamburger svg{width:24px;height:24px;fill:var(--text)}
.content{flex:1;padding:24px 28px}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90}
.sidebar-overlay.show{display:block}

/* Top bar actions */
.top-bar{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-group label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.filter-group select{padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-family:inherit;outline:none;cursor:pointer}
.filter-group select:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--glow)}
.search-wrap{position:relative;flex:1;max-width:320px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;fill:var(--muted)}
.search-input{padding:10px 14px 10px 40px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-family:inherit;outline:none;width:100%}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--glow)}
.btn-add{padding:10px 18px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-weight:700;font-size:13px;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-add:hover{opacity:.9}

/* Selection bar */
.select-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px;padding:14px 18px;background:var(--card);border:1px solid var(--border);border-radius:12px}
.select-bar-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.btn-sm{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text)}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.select-count{font-size:13px;color:var(--accent);font-weight:700}
.btn-export{padding:10px 22px;background:linear-gradient(135deg,#dc2626,#ef4444);border:none;border-radius:10px;color:#fff;font-weight:700;font-size:13px;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:8px;box-shadow:0 4px 12px rgba(239,68,68,.25);transition:all .15s}
.btn-export:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(239,68,68,.35)}
.btn-export:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-export svg{width:16px;height:16px;fill:#fff}

/* Store grid */
.store-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.store-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;transition:all .15s;position:relative}
.store-card:hover{border-color:var(--accent);box-shadow:0 4px 12px var(--glow)}
.store-card.selected{border-color:var(--accent);background:var(--glow)}
.store-card-top{display:flex;gap:12px;align-items:start}
.store-check{width:20px;height:20px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;margin-top:2px}
.store-card-info{flex:1;cursor:pointer}
.store-card-name{font-weight:700;font-size:14px}
.store-card-id{font-size:11px;color:var(--muted);margin-top:2px}
.store-card-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.store-card-stats{display:flex;gap:8px;font-size:11px;font-weight:500}
.has-notes{font-size:9px;background:var(--success);color:#fff;padding:2px 7px;border-radius:5px;font-weight:700}
.has-photos{font-size:9px;background:var(--info);color:#fff;padding:2px 7px;border-radius:5px;font-weight:700}
.btn-edit{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:var(--card2);color:var(--text)}
.btn-edit:hover{border-color:var(--accent);color:var(--accent)}
.btn-del{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:var(--card2);color:var(--danger)}
.btn-del:hover{border-color:var(--danger);background:rgba(239,68,68,.1)}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;justify-content:center;align-items:start;padding:40px 20px;overflow-y:auto}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:640px;padding:28px;position:relative;animation:fadeIn .25s ease}
.modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:8px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-close:hover{border-color:var(--danger);color:var(--danger)}
.modal h2{font-family:'Outfit',sans-serif;font-size:20px;font-weight:700;margin-bottom:20px;padding-right:40px}
.section{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.section h3{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* Add store modal */
.add-field{margin-bottom:14px}
.add-field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.add-field input{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:inherit;outline:none}
.add-field input:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--glow)}

/* Photos */
.photo-upload-area{border:2px dashed var(--border);border-radius:10px;padding:28px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:12px}
.photo-upload-area:hover{border-color:var(--accent);background:var(--glow)}
.photo-upload-area svg{width:32px;height:32px;fill:var(--muted);margin-bottom:6px}
.photo-upload-area p{color:var(--muted);font-size:12px}
.photos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-top:10px}
.photo-thumb{width:100%;aspect-ratio:1;border-radius:8px;object-fit:cover;border:1px solid var(--border)}
.photo-item{position:relative}
.photo-remove{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:var(--danger);color:#fff;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}

/* Comments */
.comment-box{width:100%;min-height:80px;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-family:inherit;resize:vertical;outline:none}
.comment-box:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--glow)}
.btn-primary{padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;color:#fff;font-weight:700;font-size:13px;font-family:inherit;cursor:pointer}
.btn-primary:hover{opacity:.9}
.report-entry{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px}
.report-entry-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.report-entry-date{font-size:11px;color:var(--muted);font-weight:600}
.report-entry-text{font-size:12px;line-height:1.6}
.entry-photos{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px;margin-top:8px}
.entry-photos img{width:100%;aspect-ratio:1;border-radius:6px;object-fit:cover;border:1px solid var(--border)}

/* PDF loading */
.pdf-loading{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:16px}
.pdf-loading .spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
.pdf-loading p{color:#fff;font-size:15px;font-weight:600}
.pdf-loading .progress{color:rgba(255,255,255,.6);font-size:12px}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state svg{width:64px;height:64px;fill:var(--border);margin-bottom:16px}
.empty-state h3{font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px}
.empty-state p{font-size:13px;max-width:400px;margin:0 auto}

.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.show{display:block}
  .main{margin-left:0}
  .hamburger{display:flex}
  .content{padding:14px}
  .topbar{padding:12px 16px}
  .topbar-title{font-size:16px}
  .store-grid{grid-template-columns:1fr}
  .top-bar{flex-direction:column}
  .search-wrap{max-width:100%}
  .select-bar{flex-direction:column;align-items:stretch}
  .modal{margin-top:20px}
}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body data-theme="dark">

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><span>BRATALO</span></div>
  <nav class="sidebar-nav">
    <a class="nav-item" href="inventario.html">

    </button>

</aside>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <button class="modal-close" onclick="closeEditModal()">×</button>
    <h2 id="editTitle"></h2>
    <div class="section">
      <h3>📸 Fotos</h3>
      <div class="photo-upload-area" onclick="document.getElementById('photoInput').click()">
        <svg viewBox="0 0 24 24"><path d="M19 7v2.99s-1.99.01-2 0V7h-3s.01-1.99 0-2h3V2h2v3h3v2h-3zm-3 4V8h-3V5H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-8h-3zM5 19l3-4 2 3 3-4 4 5H5z"/></svg>
        <p>Clic para subir fotos</p>
      </div>
      <input type="file" id="photoInput" accept="image/*" multiple style="display:none" onchange="handlePhotos(event)">
      <div class="photos-grid" id="photosGrid"></div>
    </div>
    <div class="section">
      <h3>💬 Comentarios</h3>
      <textarea class="comment-box" id="commentBox" placeholder="Escribe una observación…"></textarea>
      <div style="margin-top:10px"><button class="btn-primary" onclick="saveComment()">Guardar</button></div>
      <div id="commentsList" style="margin-top:14px"></div>
    </div>
  </div>
</div>

<main class="main">
  <header class="topbar">
    <div style="display:flex;align-items:center;gap:12px">
      <button class="hamburger" onclick="openSidebar()"><svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg></button>
      <div class="topbar-title">📋 Reportes por Sucursal</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <button class="btn-theme" onclick="toggleTheme()"><svg viewBox="0 0 24 24"><path d="M12 3a1 1 0 011 1v1a1 1 0 01-2 0V4a1 1 0 011-1zm0 15a1 1 0 011 1v1a1 1 0 01-2 0v-1a1 1 0 011-1zm9-6a1 1 0 010 2h-1a1 1 0 010-2h1zM5 12a1 1 0 010 2H4a1 1 0 010-2h1zm14.07-6.36a1 1 0 010 1.41l-.71.71a1 1 0 01-1.41-1.41l.71-.71a1 1 0 011.41 0zM7.05 17.66a1 1 0 010 1.41l-.71.71a1 1 0 01-1.41-1.41l.71-.71a1 1 0 011.41 0zM19.07 18.36a1 1 0 01-1.41 0l-.71-.71a1 1 0 011.41-1.41l.71.71a1 1 0 010 1.41zM7.05 6.34a1 1 0 01-1.41 0l-.71-.71A1 1 0 016.34 4.22l.71.71a1 1 0 010 1.41zM12 8a4 4 0 100 8 4 4 0 000-8z"/></svg></button>
    </div>
  </header>

  <div class="content">
    <!-- Top actions -->
    <div class="top-bar">
      <div class="filter-group">
        <label>Proveedor</label>
        <select id="fProv" style="min-width:220px">
          <option value="">Selecciona proveedor</option>
          <option value="GRANOS Y SEMILLAS DE MEXICO, S.A. DE C.V.">GRANOS Y SEMILLAS DE MEXICO</option>
          <option value="VEPORTO DE MEXICO">VEPORTO DE MEXICO</option>
        </select>
      </div>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input class="search-input" type="text" placeholder="Buscar sucursal…" id="storeSearch" oninput="filterCards()">
      </div>
    </div>

    <!-- Selection bar -->
    <div class="select-bar">
      <div class="select-bar-left">
        <button class="btn-sm" onclick="selectAll()">Seleccionar Todas</button>
        <button class="btn-sm" onclick="selectNone()">Deseleccionar</button>
        <button class="btn-sm" onclick="selectWithNotes()">Solo con Notas</button>
        <span class="select-count" id="selectCount">0 seleccionadas</span>
      </div>
      <button class="btn-export" id="btnExport" onclick="exportPDF()" disabled>
        <svg viewBox="0 0 24 24"><path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8.5 7.5c0 .83-.67 1.5-1.5 1.5H9v2H7.5V7H10c.83 0 1.5.67 1.5 1.5v1zm5 2c0 .83-.67 1.5-1.5 1.5h-2.5V7H15c.83 0 1.5.67 1.5 1.5v3zm4-3H19v1h1.5V11H19v2h-1.5V7h3v1.5zM9 9.5h1v-1H9v1zM4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm10 5.5h1v-3h-1v3z"/></svg>
        Exportar PDF

    </div>

    <!-- Store grid -->
    <div class="store-grid" id="storeGrid"></div>

</main>

<script>
if(sessionStorage.getItem('vp_auth')!=='1'){window.location.href='index.html';}
const currentUser=sessionStorage.getItem('vp_user')||'Juan';
document.getElementById('userName').textContent=currentUser;
document.getElementById('userAvatar').textContent=currentUser.charAt(0);

function toggleTheme(){document.body.dataset.theme=document.body.dataset.theme==='dark'?'light':'dark';localStorage.setItem('vp_theme',document.body.dataset.theme)}
(function(){const t=localStorage.getItem('vp_theme');if(t)document.body.dataset.theme=t})();
function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('sidebarOverlay').classList.add('show')}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('show')}
function doLogout(){sessionStorage.clear();window.location.href='index.html';}

let reportsData=JSON.parse(localStorage.getItem('br_reports')||'{}');
let selectedStores=new Set();
let editingStoreId=null;

function saveReports(){localStorage.setItem('br_reports',JSON.stringify(reportsData))}

// Init
buildGrid();

// ===== GRID =====
function buildGrid(){
  document.getElementById('storeGrid').innerHTML=stores.map(s=>{
    const k='store_'+s.id;
    const d=reportsData[k]||{photos:[],comments:[]};
    const photoCount=d.photos.length+d.comments.reduce((n,c)=>n+(c.photos?c.photos.length:0),0);
    const commentCount=d.comments.length;
    const checked=selectedStores.has(s.id)?'checked':'';
    const hasContent=photoCount>0||commentCount>0;
    return `<div class="store-card ${selectedStores.has(s.id)?'selected':''}" data-id="${s.id}" data-name="${s.name}" data-has="${hasContent?1:0}">
      <div class="store-card-top">
        <input type="checkbox" class="store-check" ${checked} onchange="toggleStore('${s.id}',this.checked)" onclick="event.stopPropagation()">
        <div class="store-card-info" onclick="toggleStore('${s.id}',!selectedStores.has('${s.id}'))">
          <div class="store-card-name">${s.name}</div>
          <div class="store-card-id">ID: ${s.id}</div>
        </div>
      </div>
      <div class="store-card-bottom">
        <div class="store-card-stats">
          ${photoCount>0?`<span class="has-photos">${photoCount} foto${photoCount>1?'s':''}</span>`:''}
          ${commentCount>0?`<span class="has-notes">${commentCount} nota${commentCount>1?'s':''}</span>`:''}
          ${!hasContent?'<span style="color:var(--muted);font-size:11px">Sin notas</span>':''}
        </div>
        <div>
          <button class="btn-edit" onclick="event.stopPropagation();openEditModal('${s.id}','${s.name.replace(/'/g,"\\'")}')">📝 Editar</button>
        </div>
      </div>
    </div>`;
  }).join('');
  filterCards();
  updateSelectCount();
}

function filterCards(){
  const q=document.getElementById('storeSearch').value.toLowerCase();
  document.querySelectorAll('.store-card').forEach(c=>{
    const txt=(c.dataset.name+' '+c.dataset.id).toLowerCase();
    c.style.display=txt.includes(q)?'':'none';
  });
}

function toggleStore(id,checked){
  // Normalize id
  id=isNaN(id)?id:parseInt(id);
  if(checked)selectedStores.add(id);else selectedStores.delete(id);
  const card=document.querySelector(`.store-card[data-id="${id}"]`);
  if(card){card.classList.toggle('selected',checked);const cb=card.querySelector('.store-check');if(cb)cb.checked=checked;}
  updateSelectCount();
}
function selectAll(){
  document.querySelectorAll('.store-card').forEach(c=>{
    if(c.style.display!=='none'){let id=c.dataset.id;id=isNaN(id)?id:parseInt(id);selectedStores.add(id);c.classList.add('selected');c.querySelector('.store-check').checked=true;}
  });updateSelectCount();
}
function selectNone(){
  selectedStores.clear();
  document.querySelectorAll('.store-card').forEach(c=>{c.classList.remove('selected');c.querySelector('.store-check').checked=false;});
  updateSelectCount();
}
function selectWithNotes(){
  selectNone();
  document.querySelectorAll('.store-card').forEach(c=>{
    if(c.dataset.has==='1'){let id=c.dataset.id;id=isNaN(id)?id:parseInt(id);selectedStores.add(id);c.classList.add('selected');c.querySelector('.store-check').checked=true;}
  });updateSelectCount();
}
function updateSelectCount(){
  const n=selectedStores.size;
  document.getElementById('selectCount').textContent=n+' seleccionada'+(n!==1?'s':'');
  document.getElementById('btnExport').disabled=n===0;
}

// ===== EDIT MODAL =====
function openEditModal(id,name){
  editingStoreId=isNaN(id)?id:parseInt(id);
  document.getElementById('editTitle').textContent=name;
  document.getElementById('editModal').classList.add('show');
  document.body.style.overflow='hidden';
  renderModalData();
}
function closeEditModal(){
  document.getElementById('editModal').classList.remove('show');
  document.body.style.overflow='';editingStoreId=null;buildGrid();
}

function renderModalData(){
  const k='store_'+editingStoreId;
  const data=reportsData[k]||{photos:[],comments:[]};
  document.getElementById('photosGrid').innerHTML=data.photos.map((p,i)=>`
    <div class="photo-item"><img src="${p.src}" class="photo-thumb"><button class="photo-remove" onclick="removePhoto(${i})">×</button></div>`).join('');
  document.getElementById('commentsList').innerHTML=data.comments.slice().reverse().map((c,i)=>`
    <div class="report-entry">
      <div class="report-entry-header">
        <div class="report-entry-date">${c.date} · ${c.user}</div>
        <button style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px" onclick="removeComment(${data.comments.length-1-i})">×</button>
      </div>
      <div class="report-entry-text">${c.text}</div>
      ${c.photos&&c.photos.length?`<div class="entry-photos">${c.photos.map(p=>`<img src="${p}">`).join('')}</div>`:''}
    </div>`).join('');
}

function handlePhotos(e){
  const files=e.target.files;if(!files.length)return;
  const k='store_'+editingStoreId;
  if(!reportsData[k])reportsData[k]={photos:[],comments:[]};
  let loaded=0;
  Array.from(files).forEach(f=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      reportsData[k].photos.push({src:ev.target.result,name:f.name,date:new Date().toLocaleDateString('es-MX')});
      loaded++;if(loaded===files.length){saveReports();renderModalData();}
    };reader.readAsDataURL(f);
  });e.target.value='';
}
function removePhoto(i){const k='store_'+editingStoreId;reportsData[k].photos.splice(i,1);saveReports();renderModalData()}
function saveComment(){
  const text=document.getElementById('commentBox').value.trim();if(!text)return;
  const k='store_'+editingStoreId;
  if(!reportsData[k])reportsData[k]={photos:[],comments:[]};
  const photos=reportsData[k].photos.map(p=>p.src);
  reportsData[k].comments.push({text,user:currentUser,date:new Date().toLocaleDateString('es-MX',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}),photos});
  reportsData[k].photos=[];
  saveReports();document.getElementById('commentBox').value='';renderModalData();
}
function removeComment(i){const k='store_'+editingStoreId;reportsData[k].comments.splice(i,1);saveReports();renderModalData()}

// ===== PDF EXPORT =====
async function exportPDF(){
  if(selectedStores.size===0)return;
  const btn=document.getElementById('btnExport');btn.disabled=true;
  const overlay=document.createElement('div');overlay.className='pdf-loading';
  overlay.innerHTML='<div class="spinner"></div><p>Generando PDF ejecutivo…</p><div class="progress" id="pdfProgress"></div>';
  document.body.appendChild(overlay);
  try{await _buildPDF();}catch(err){console.error(err);alert('Error: '+err.message);}
  finally{overlay.remove();btn.disabled=false;}
}

async function _buildPDF(){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'letter'});
  const W=doc.internal.pageSize.getWidth();
  const H=doc.internal.pageSize.getHeight();
  const M=18,CW=W-2*M;
  const now=new Date();
  const dateStr=now.toLocaleDateString('es-MX',{year:'numeric',month:'long',day:'numeric'});
  const timeStr=now.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});

  // Get selected stores sorted
  const selStores=stores.filter(s=>selectedStores.has(s.id)).sort((a,b)=>a.name.localeCompare(b.name));

  // === COVER ===
  doc.setFillColor(30,41,59);doc.rect(0,0,W,60,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(30);doc.setFont('helvetica','bold');
  doc.text('BRATALO',M,30);
  doc.setFontSize(13);doc.setFont('helvetica','normal');
  doc.text('Reporte Ejecutivo de Sucursales',M,42);
  doc.setFontSize(10);
  doc.text(dateStr+' · '+timeStr,M,52);

  let y=75;
  const provFilter=document.getElementById('fProv').value;
  const provName=provFilter||'Todos los proveedores';
  doc.setTextColor(30,41,59);doc.setFontSize(12);doc.setFont('helvetica','bold');
  doc.text('Proveedor: '+provName,M,y);y+=8;
  doc.setFontSize(11);
  doc.text('Sucursales incluidas: '+selStores.length,M,y);y+=12;

  // Summary list
  doc.setFillColor(241,245,249);doc.rect(M,y,CW,7,'F');
  doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(100,116,139);
  doc.text('Sucursal',M+3,y+5);doc.text('ID',M+90,y+5);doc.text('Fotos',M+110,y+5);doc.text('Comentarios',M+130,y+5);
  y+=8;

  doc.setFont('helvetica','normal');doc.setFontSize(8);
  selStores.forEach(s=>{
    if(y>H-20){doc.addPage();y=M;}
    const k='store_'+s.id;
    const d=reportsData[k]||{photos:[],comments:[]};
    const pc=d.photos.length+d.comments.reduce((n,c)=>n+(c.photos?c.photos.length:0),0);
    doc.setTextColor(30,41,59);
    doc.text(s.name.length>45?s.name.substring(0,45)+'…':s.name,M+3,y+4);
    doc.text(String(s.id),M+90,y+4);
    doc.text(String(pc),M+110,y+4);
    doc.setTextColor(d.comments.length>0?59:170,d.comments.length>0?130:170,d.comments.length>0?246:170);
    doc.text(d.comments.length>0?d.comments.length+' notas':'—',M+130,y+4);
    doc.setDrawColor(235,235,235);doc.line(M,y+6,W-M,y+6);
    y+=7;
  });

  // === PER-STORE PAGES ===
  const progEl=document.getElementById('pdfProgress');
  for(let si=0;si<selStores.length;si++){
    const s=selStores[si];
    if(progEl)progEl.textContent=`Procesando ${si+1} de ${selStores.length}…`;
    await new Promise(r=>setTimeout(r,10));

    const k='store_'+s.id;
    const data=reportsData[k]||{photos:[],comments:[]};

    // Collect all photos
    const allPhotos=[];
    data.comments.forEach(c=>{if(c.photos)c.photos.forEach(p=>allPhotos.push(p))});
    data.photos.forEach(p=>allPhotos.push(p.src));

    // Skip if no content at all
    if(allPhotos.length===0&&data.comments.length===0)continue;

    doc.addPage();y=M;
    // Header
    doc.setFillColor(30,41,59);doc.rect(0,0,W,22,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(16);doc.setFont('helvetica','bold');
    doc.text(s.name,M,15);
    doc.setFontSize(9);doc.setFont('helvetica','normal');
    doc.text('ID: '+s.id,W-M,15,{align:'right'});

    y=30;

    // Photos
    if(allPhotos.length>0){
      doc.setTextColor(30,41,59);doc.setFontSize(12);doc.setFont('helvetica','bold');
      doc.text('Evidencia Fotográfica',M,y);y+=7;
      const pw=(CW-6)/2,ph=pw*0.7;
      let col=0;
      for(let i=0;i<allPhotos.length;i++){
        if(y+ph>H-18){doc.addPage();y=M;col=0;}
        const px=M+col*(pw+6);
        try{doc.addImage(allPhotos[i],'JPEG',px,y,pw,ph);}
        catch(e){doc.setFillColor(245,245,245);doc.roundedRect(px,y,pw,ph,2,2,'F');doc.setTextColor(150,150,150);doc.setFontSize(8);doc.text('Foto '+(i+1),px+pw/2,y+ph/2,{align:'center'});}
        col++;if(col>=2){col=0;y+=ph+4;}
      }
      if(col>0)y+=ph+4;
      y+=4;
    }

    // Comments
    if(data.comments.length>0){
      if(y>H-40){doc.addPage();y=M;}
      doc.setTextColor(30,41,59);doc.setFontSize(12);doc.setFont('helvetica','bold');
      doc.text('Observaciones',M,y);y+=7;
      data.comments.forEach(c=>{
        if(y>H-30){doc.addPage();y=M;}
        doc.setFillColor(248,250,252);doc.roundedRect(M,y,CW,5,1,1,'F');
        doc.setTextColor(120,120,120);doc.setFontSize(7);doc.setFont('helvetica','bold');
        doc.text(c.date+' · '+c.user,M+3,y+3.5);y+=7;
        doc.setTextColor(30,41,59);doc.setFontSize(9);doc.setFont('helvetica','normal');
        const lines=doc.splitTextToSize(c.text,CW-6);
        lines.forEach(line=>{if(y>H-14){doc.addPage();y=M;}doc.text(line,M+3,y+3);y+=5;});
        y+=5;
      });
    }
  }

  // Footer
  const tp=doc.internal.getNumberOfPages();
  for(let i=1;i<=tp;i++){
    doc.setPage(i);
    doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(170,170,170);
    doc.text('BRATALO · '+provName+' · '+dateStr,M,H-7);
    doc.text('Pág '+i+'/'+tp,W-M,H-7,{align:'right'});
    doc.setDrawColor(210,210,210);doc.line(M,H-10,W-M,H-10);
  }

  doc.save('Reporte_Ejecutivo_'+selStores.length+'_sucursales_'+now.toISOString().slice(0,10)+'.pdf');
}
